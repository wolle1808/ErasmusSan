<style>

  /* ---------- HERO ---------- */

  .status.offline { color: var(--red-ink); }

  .month-label { font-family: "Fraunces", serif; font-weight: 600; font-size: 1.2rem;

  .cell.clickable:hover { border-color: var(--sea); transform: translateY(-2px);

  .cell.weekend { background: #fbeedd; }

  .hflag { font-size: .72rem; line-height: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,.15)); }
  .visitor-tags { display: flex; flex-direction: column; gap: 2px; margin-top: auto; }
  .vtag {

  .vmore { font-size: .58rem; color: var(--red-ink); font-weight: 800; padding-left: 2px; }

  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin: 18px 4px 2px; font-size: .8rem;

  .swatch { width: 15px; height: 15px; border-radius: 5px; border: 1px solid var(--line); position: relative; }
  .swatch.green { background: linear-gradient(160deg, #eaf7e7, var(--green-soft)); border-color: #a7dcae; }

  /* Termin-Formular */

  .event-form .btn { background: linear-gradient(135deg, var(--sea), var(--sky)); color: #fff; border: 0;

  .loading { text-align: center; color: var(--sea-deep); padding: 80px 0; font-weight: 800; font-size: 1.05rem; }

  "2026-10-03": [{c:"de", n:"Tag der Deutschen Einheit"}],
  "2026-10-12": [{c:"es", n:"Fiesta Nacional de España"}],

};
const FLAG = { de: "🇩🇪", es: "🇪🇸" };

/* Schulferien Saarland 2026 (amtlich). */
const FERIEN = [
  { name: "Herbstferien Saarland",     from: "2026-10-05", to: "2026-10-16" },
  { name: "Weihnachtsferien Saarland", from: "2026-12-21", to: "2026-12-31" }
];

/* Farbpalette pro Person (deterministisch über Namen). */
const PALETTE = ["#e0795f","#117a93","#3f9b60","#c98a2e","#936ad0","#cf5d84","#5a8f3c","#d77f3b","#2f7fae","#b05fae"];
const hashName = (s) => { let h = 0; for (let i = 0; i < s.length; i++) h = (h*31 + s.charCodeAt(i)) >>> 0; return h; };
const colorFor = (name) => PALETTE[hashName((name||"").trim().toLowerCase()) % PALETTE.length];

// --- Hilfsfunktionen ---
const iso = (d) => {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
};
const parseISO = (s) => { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); };
const inRange = (d) => d >= START && d <= END;
const fmtDE = (s) => { const d = parseISO(s); return `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.${d.getFullYear()}`; };
const fmtShort = (s) => { const d = parseISO(s); return `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.`; };
const nights = (from, to) => Math.round((parseISO(to) - parseISO(from)) / 86400000);

const FERIEN_DAYS = (() => {
  const set = new Set(); const names = {};
  for (const f of FERIEN) {
    let d = parseISO(f.from); const end = parseISO(f.to);
    while (d <= end) { const k = iso(d); set.add(k); names[k] = f.name; d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1); }
  }
  return { set, names };
})();

}

function Countdown() {
  const now = new Date(); const t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const totalDays = Math.round((END - START) / 86400000) + 1;
  if (t0 < START) {
    const d = Math.ceil((START - t0) / 86400000);
    return <div className="countdown"><span className="pill">🌅 Noch <b>{d}</b> {d === 1 ? "Tag" : "Tage"} bis Santander</span></div>;
  }
  if (t0 <= END) {
    const day = Math.round((t0 - START) / 86400000) + 1;
    return <div className="countdown"><span className="pill">📍 Tag <b>{day}</b> von {totalDays} in Santander</span></div>;
  }
  return <div className="countdown"><span className="pill">🧳 ¡Hasta la próxima, Santander!</span></div>;
}

function App() {
  const [blocked, setBlocked] = useState({});
  const [visits, setVisits] = useState([]);
  const [events, setEvents] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [online, setOnline] = useState(false);
  const [mode, setMode] = useState("view");
  const [monthCursor, setMonthCursor] = useState(new Date(2026, 8, 1));
  const [form, setForm] = useState({ name: "", from: "", to: "", people: "" });
  const [evForm, setEvForm] = useState({ title: "", from: "", to: "", blocks: true });
  const [error, setError] = useState("");
  const [evError, setEvError] = useState("");
  const [layers, setLayers] = useState({ weekend: true, holiday: true, ferien: true, events: true });
  const formRef = useRef(null);
  const nameRef = useRef(null);

  useEffect(() => {
    const aRef = db.ref("blocked");
    const vRef = db.ref("visits");
    const eRef = db.ref("events");
    const cRef = db.ref(".info/connected");
    const onA = aRef.on("value", (snap) => { setBlocked(snap.val() || {}); setLoaded(true); });
    const onV = vRef.on("value", (snap) => {
      const val = snap.val() || {};
      const arr = Object.entries(val).map(([id, v]) => ({ id, ...v }));
      arr.sort((a, b) => a.from.localeCompare(b.from) || a.name.localeCompare(b.name));
      setVisits(arr);
    });
    const onE = eRef.on("value", (snap) => {
      const val = snap.val() || {};
      const arr = Object.entries(val).map(([id, v]) => ({ id, ...v }));
      arr.sort((a, b) => a.from.localeCompare(b.from));
      setEvents(arr);
    });
    const onC = cRef.on("value", (snap) => setOnline(!!snap.val()));
    return () => { aRef.off("value", onA); vRef.off("value", onV); eRef.off("value", onE); cRef.off("value", onC); };
  }, []);

  const todayIso = iso(new Date());

  const visitorsByDay = useMemo(() => {
    const map = {};
    for (const v of visits) {
      let d = parseISO(v.from);
      const end = parseISO(v.to);
      while (d <= end) {
        const key = iso(d);
        (map[key] = map[key] || []).push(v.name);
        d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1);
      }
    }
    return map;
  }, [visits]);

  const eventsByDay = useMemo(() => {
    const map = {}; const blocked = new Set();
    for (const ev of events) {
      let d = parseISO(ev.from); const end = parseISO(ev.to);
      while (d <= end) {
        const key = iso(d);
        (map[key] = map[key] || []).push(ev);
        if (ev.blocks) blocked.add(key);
        d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1);
      }
    }
    return { map, blocked };
  }, [events]);

  const cells = useMemo(() => {
    const y = monthCursor.getFullYear(), m = monthCursor.getMonth();
    const first = new Date(y, m, 1);
    const daysInMonth = new Date(y, m+1, 0).getDate();
    let lead = (first.getDay() + 6) % 7;
    const arr = [];
    for (let i = 0; i < lead; i++) arr.push(null);
    for (let d = 1; d <= daysInMonth; d++) arr.push(new Date(y, m, d));
    while (arr.length % 7 !== 0) arr.push(null);
    return arr;
  }, [monthCursor]);

  const canPrev = monthCursor > new Date(START.getFullYear(), START.getMonth(), 1);
  const canNext = monthCursor < new Date(END.getFullYear(), END.getMonth(), 1);
  const shift = (delta) => setMonthCursor(c => new Date(c.getFullYear(), c.getMonth()+delta, 1));

  const toggleDay = (key) => {
    if (blocked[key]) db.ref("blocked/" + key).remove();
    else db.ref("blocked/" + key).set(true);
  };

  // Klick auf Tag: Edit = Verfügbarkeit, View = Zeitraum vorwählen
  const handleDayClick = (d) => {
    if (!inRange(d)) return;
    const key = iso(d);
    if (mode === "edit") { toggleDay(key); return; }
    setForm(f => {
      if (!f.from || (f.from && f.to)) return { ...f, from: key, to: "" };
      if (key < f.from) return { ...f, from: key, to: "" };
      return { ...f, to: key };
    });
  };

  const scrollToForm = () => {
    if (formRef.current) formRef.current.scrollIntoView({ behavior: "smooth", block: "center" });
    setTimeout(() => nameRef.current && nameRef.current.focus(), 350);
  };

  const addVisit = (e) => {
    e.preventDefault();
    setError("");
    const name = form.name.trim();
    if (!name) return setError("Bitte einen Namen eingeben.");
    if (!form.from || !form.to) return setError("Bitte Start- und Enddatum wählen.");
    const f = parseISO(form.from), t = parseISO(form.to);
    if (t < f) return setError("Das Enddatum liegt vor dem Startdatum.");
    if (!inRange(f) || !inRange(t)) return setError("Bitte ein Datum innerhalb des ERASMUS-Zeitraums wählen (01.09.2026 – 15.01.2027).");
    const people = Math.max(1, parseInt(form.people, 10) || 1);
    db.ref("visits").push({ name, from: form.from, to: form.to, people });
    setForm({ name: "", from: "", to: "", people: "" });
  };

  const removeVisit = (id) => {
    if (confirm("Diesen Besuch wirklich löschen?")) db.ref("visits/" + id).remove();
  };

  const addEvent = (e) => {
    e.preventDefault();
    setEvError("");
    const title = evForm.title.trim();
    if (!title) return setEvError("Bitte einen Titel eingeben (z. B. Klausur, Marathon, geblockt).");
    if (!evForm.from || !evForm.to) return setEvError("Bitte Start- und Enddatum wählen.");
    const f = parseISO(evForm.from), t = parseISO(evForm.to);
    if (t < f) return setEvError("Das Enddatum liegt vor dem Startdatum.");
    if (!inRange(f) || !inRange(t)) return setEvError("Bitte ein Datum innerhalb des Zeitraums wählen (01.09.2026 – 15.01.2027).");
    db.ref("events").push({ title, from: evForm.from, to: evForm.to, blocks: !!evForm.blocks });
    setEvForm({ title: "", from: "", to: "", blocks: true });
  };

  const removeEvent = (id) => {
    if (confirm("Diesen Termin wirklich löschen?")) db.ref("events/" + id).remove();
  };

  // Live-Feedback fürs Formular
  const feedback = useMemo(() => {
    if (!form.from || !form.to) return null;
    const f = parseISO(form.from), t = parseISO(form.to);
    if (t < f) return null;
    let total = 0, blockedDays = 0;
    for (let d = new Date(f); d <= t; d.setDate(d.getDate()+1)) {
      if (!inRange(d)) continue;
      total++; if (blocked[iso(d)] || eventsByDay.blocked.has(iso(d))) blockedDays++;
    }
    const overlaps = visits.filter(v => !(parseISO(v.to) < f || parseISO(v.from) > t));
    const blockingEvents = events.filter(ev => ev.blocks && !(parseISO(ev.to) < f || parseISO(ev.from) > t));
    return { total, blockedDays, overlaps, blockingEvents };
  }, [form.from, form.to, blocked, visits, events, eventsByDay]);

  // Auswahl-Range für Hervorhebung
  const selSet = useMemo(() => {
    const s = new Set();
    if (!form.from) return s;
    const f = parseISO(form.from);
    const t = form.to ? parseISO(form.to) : f;
    if (t < f) { s.add(form.from); return s; }
    for (let d = new Date(f); d <= t; d.setDate(d.getDate()+1)) s.add(iso(d));
    return s;
  }, [form.from, form.to]);

  const minIso = iso(START), maxIso = iso(END);
  const toggleLayer = (k) => setLayers(l => ({ ...l, [k]: !l[k] }));

  if (!loaded) return (
    <div className="wrap"><div className="loading"><span className="spin">🌊</span><br/>Verbinde mit Santander…</div></div>
  );

  const blockedAll = new Set(Object.keys(blocked));
  eventsByDay.blocked.forEach(k => blockedAll.add(k));
  const blockedCount = blockedAll.size;
  const totalNights = visits.reduce((s, v) => s + nights(v.from, v.to), 0);
  const note = MONTH_NOTES[monthCursor.getMonth()];

  return (
    <div>
      <div className="hero">
        <HeroScene />
        <div className="hero-veil"></div>
        <div className="hero-text">
          <div className="hero-kicker">ERASMUS · Cantabria</div>
          <div className="hero-title">Maurice en Santander</div>
          <div className="hero-sub">¡Ven a visitarme al norte de España! 🌊☀️</div>
          <div className="hero-dates">1. September 2026 – 15. Januar 2027</div>
        </div>
      </div>

      <div className="wrap">
        <Countdown />

        <div className="status-row">
          <span className={"status " + (online ? "online" : "offline")}>
            <i className="dot-s"></i>{online ? "Live verbunden" : "Offline – wird nachgesendet"}
          </span>
        </div>

        <div className="stats">
          <div className="stat"><div className="stat-num r">{blockedCount}</div><div className="stat-label">Gesperrte Tage</div></div>
          <div className="stat"><div className="stat-num s">{visits.length}</div><div className="stat-label">Besuche</div></div>
          <div className="stat"><div className="stat-num s">{totalNights}</div><div className="stat-label">Übernachtungen</div></div>
        </div>

        <div className="toolbar">
          <div className="modes">
            <button className={mode==="view"?"active":""} onClick={() => setMode("view")}>👁 Ansehen</button>
            <button className={mode==="edit"?"active":""} onClick={() => setMode("edit")}>🚫 Tage sperren</button>
          </div>
          <div className="month-nav">
            <button onClick={() => shift(-1)} disabled={!canPrev} aria-label="Vorheriger Monat">‹</button>
            <div className="month-label">{MONTHS[monthCursor.getMonth()]} {monthCursor.getFullYear()}</div>
            <button onClick={() => shift(1)} disabled={!canNext} aria-label="Nächster Monat">›</button>
          </div>
        </div>

        <div className="layers">
          <Chip on={layers.weekend} onClick={() => toggleLayer("weekend")}>🏖️ Wochenenden</Chip>
          <Chip on={layers.holiday} onClick={() => toggleLayer("holiday")}>🎉 Feiertage 🇩🇪🇪🇸</Chip>
          <Chip on={layers.ferien} onClick={() => toggleLayer("ferien")}>🎒 Ferien Saarland</Chip>
          <Chip on={layers.events} onClick={() => toggleLayer("events")}>📌 Meine Termine</Chip>
        </div>

        {mode === "view" && form.from && (
          <div className="sel-banner">
            📅 Ausgewählt: <b>{fmtShort(form.from)}{form.to ? ` – ${fmtShort(form.to)}` : " …"}</b>
            {!form.to && <span style={{fontWeight:600, color:"var(--muted)"}}>(Endtag anklicken)</span>}
            <span className="sb-spacer"></span>
            <button className="go" onClick={scrollToForm}>Eintragen ↓</button>
            <button className="clr" onClick={() => setForm(f => ({...f, from:"", to:""}))}>✕</button>
          </div>
        )}

        <div className="card">
          {note && <div className="month-note">{note}</div>}
          {mode === "edit"
            ? <div className="edit-hint">🚫 <b>Tage sperren:</b> Klick die Tage an, an denen <b>kein Besuch</b> möglich ist (kein Grund nötig). Erneuter Klick hebt die Sperre auf. Für benannte Termine (Klausur, Marathon) nutze „Meine Termine" unten.</div>
            : <div className="pick-hint">💡 <b>Tipp:</b> Tage antippen, um den Besuchszeitraum auszuwählen – das Formular unten füllt sich automatisch.</div>}
          <div className="grid">
            {DOW.map((d) => <div key={d} className="dow">{d}</div>)}
            {cells.map((d, i) => {
              if (!d) return <div key={i} className="cell empty" />;
              const key = iso(d);
              const within = inRange(d);
              const vs = visitorsByDay[key] || [];
              const wd = d.getDay();
              const isWeekend = wd === 0 || wd === 6;
              const hol = HOLIDAYS[key];
              const isFerien = FERIEN_DAYS.set.has(key);
              const evs = layers.events ? (eventsByDay.map[key] || []) : [];
              const isBlocked = !!blocked[key] || (layers.events && eventsByDay.blocked.has(key));
              const cls = ["cell"];
              if (!within) cls.push("out");
              if (within) cls.push("clickable");
              if (within && layers.weekend && isWeekend) cls.push("weekend");
              if (within && layers.ferien && isFerien) cls.push("ferien");
              if (vs.length) cls.push("has-visitor");
              if (isBlocked) cls.push("blocked");
              if (within && selSet.has(key)) cls.push("sel");
              if (key === todayIso) cls.push("today");
              const titleBits = [];
              if (hol) titleBits.push(hol.map(h => h.n).join(" · "));
              if (isFerien) titleBits.push(FERIEN_DAYS.names[key]);
              const evShow = (!!blocked[key] && !evs.some(e => e.blocks))
                ? [{ title: "Gesperrt", blocks: true }, ...evs] : evs;
              if (evShow.length) titleBits.push(evShow.map(e => (e.blocks ? "🚫 " : "📌 ") + e.title).join(" · "));
              if (vs.length) titleBits.push("Besuch: " + vs.join(", "));
              const visMax = evShow.length ? 1 : 2;
              const extra = Math.max(0, evShow.length - 1) + Math.max(0, vs.length - visMax);
              return (
                <div key={i} className={cls.join(" ")} onClick={() => handleDayClick(d)}
                  title={titleBits.join(" — ") || undefined}>
                  <div className="cell-top">
                    <span className="daynum">{d.getDate()}</span>
                    {within && layers.holiday && hol &&
                      <span className="hflag">{[...new Set(hol.map(h => FLAG[h.c]))].join("")}</span>}
                  </div>
                  {(evShow.length > 0 || vs.length > 0) && (
                    <div className="visitor-tags">
                      {evShow.slice(0,1).map((ev, j) => (
                        <span key={"e"+j} className={"etag " + (ev.blocks ? "block" : "info")} title={ev.title}>
                          {ev.blocks ? "🚫 " : "📌 "}{ev.title}</span>
                      ))}
                      {vs.slice(0, visMax).map((n, j) => (
                        <span key={"v"+j} className="vtag" style={{background: colorFor(n)}} title={n}>{n.split(" ")[0]}</span>
                      ))}
                      {extra > 0 && <span className="vmore">+{extra} mehr</span>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div className="legend">
            <span><i className="swatch blocked"></i> Gesperrt (kein Besuch)</span>
            <span><i className="swatch visitors"></i> Besuch (pro Person farbig)</span>
            <span><i className="swatch today"></i> Heute</span>
            {layers.weekend && <span><i className="swatch weekend"></i> Wochenende</span>}
            {layers.holiday && <span>🇩🇪🇪🇸 Feiertag</span>}
            {layers.ferien && <span><i className="swatch ferien"></i> Ferien Saarland</span>}
            {layers.events && <span><i className="swatch termin"></i> Mein Termin</span>}
          </div>
        </div>

        <section className="block" ref={formRef}>
          <h2>🧳 Besuch eintragen</h2>
          <div className="card">
            <form className="visit" onSubmit={addVisit}>
              <div className="full">
                <label>Name</label>
                <input ref={nameRef} type="text" placeholder="Dein Name" value={form.name}
                  style={form.name ? {borderLeft: `4px solid ${colorFor(form.name)}`} : null}
                  onChange={e => setForm({...form, name: e.target.value})} />
              </div>
              <div>
                <label>Von</label>
                <input type="date" min={minIso} max={maxIso} value={form.from}
                  onChange={e => setForm({...form, from: e.target.value})} />
              </div>
              <div>
                <label>Bis</label>
                <input type="date" min={minIso} max={maxIso} value={form.to}
                  onChange={e => setForm({...form, to: e.target.value})} />
              </div>
              <div className="pers">
                <label>Pers.</label>
                <input type="number" min="1" placeholder="1" value={form.people}
                  onChange={e => setForm({...form, people: e.target.value})} />
              </div>
              <button type="submit">¡Vamos!</button>
            </form>

            {feedback && (
              <div className="fb">
                {feedback.blockingEvents.length > 0
                  ? <div className="fb-line fb-bad">🚫 Besuch nicht möglich: {feedback.blockingEvents.map(b => `${b.title} (${fmtShort(b.from)}–${fmtShort(b.to)})`).join(", ")}</div>
                  : feedback.blockedDays > 0
                    ? <div className="fb-line fb-bad">🚫 {feedback.blockedDays} von {feedback.total} Tagen sind gesperrt</div>
                    : <div className="fb-line fb-ok">🟢 An diesen Tagen ist ein Besuch möglich</div>}
                {feedback.overlaps.length > 0 &&
                  <div className="fb-line fb-warn">⚠️ Gleichzeitig da: {feedback.overlaps.map(o => `${o.name} (${fmtShort(o.from)}–${fmtShort(o.to)})`).join(", ")}</div>}
              </div>
            )}
            {error && <div className="form-error">⚠️ {error}</div>}
          </div>
        </section>

        <section className="block">
          <h2>📌 Meine Termine & Sperrtage</h2>
          <div className="section-note">Nur für Maurice: wichtige Termine (Klausur, Marathon …) eintragen. Mit Häkchen sperrst du Tage für Besuche.</div>
          <div className="card">
            <form className="event-form" onSubmit={addEvent}>
              <div className="ef-row">
                <div className="full">
                  <label>Titel</label>
                  <input type="text" placeholder="z. B. Klausur, Marathon, geblockt" value={evForm.title}
                    onChange={e => setEvForm({...evForm, title: e.target.value})} />
                </div>
                <div>
                  <label>Von</label>
                  <input type="date" min={minIso} max={maxIso} value={evForm.from}
                    onChange={e => setEvForm({...evForm, from: e.target.value})} />
                </div>
                <div>
                  <label>Bis</label>
                  <input type="date" min={minIso} max={maxIso} value={evForm.to}
                    onChange={e => setEvForm({...evForm, to: e.target.value})} />
                </div>
              </div>
              <div className="ef-row2">
                <label className="chk">
                  <input type="checkbox" checked={evForm.blocks}
                    onChange={e => setEvForm({...evForm, blocks: e.target.checked})} />
                  🚫 Besuch an diesen Tagen nicht möglich
                </label>
                <button type="submit" className="btn">Termin eintragen</button>
              </div>
            </form>
            {evError && <div className="form-error">⚠️ {evError}</div>}
          </div>
          {events.length > 0 && (
            <ul className="visit-list" style={{marginTop: "12px"}}>
              {events.map(ev => (
                <li key={ev.id} className="visit-item" style={{borderLeftColor: ev.blocks ? "#5d6b74" : "var(--sea)"}}>
                  <span className="vi-name">{ev.blocks ? "🚫 " : "📌 "}{ev.title}</span>
                  <span className="vi-dates">{fmtDE(ev.from)} – {fmtDE(ev.to)}</span>
                  {ev.blocks && <span className="vi-meta" style={{background:"#e7ecee", color:"#445"}}>Besuch gesperrt</span>}
                  <span className="vi-spacer"></span>
                  <button className="del" title="Termin löschen" onClick={() => removeEvent(ev.id)}>🗑</button>
                </li>
              ))}
            </ul>
          )}
        </section>

        <section className="block">
          <h2>📋 Eingetragene Besuche {visits.length > 0 && `(${visits.length})`}</h2>
          {visits.length === 0 ? (
            <div className="card"><div className="empty-state">Noch keine Besuche eingetragen. ¡Sé el primero! 🙌</div></div>
          ) : (
            <ul className="visit-list">
              {visits.map(v => {
                const n = nights(v.from, v.to);
                const col = colorFor(v.name);
                const ppl = v.people || 1;
                return (
                  <li key={v.id} className="visit-item" style={{borderLeftColor: col}}>
                    <span className="vi-name" style={{color: col}}>{v.name}</span>
                    <span className="vi-dates">{fmtDE(v.from)} – {fmtDE(v.to)}</span>
                    <span className="vi-meta">{n === 0 ? "Tagesbesuch" : `${n} ${n === 1 ? "Nacht" : "Nächte"}`}</span>
                    {ppl > 1 && <span className="vi-people">👥 {ppl} Pers.</span>}
                    <span className="vi-spacer"></span>
                    <button className="del" title="Besuch löschen" onClick={() => removeVisit(v.id)}>🗑</button>
                  </li>
                );
              })}
            </ul>
          )}
        </section>

        <div className="footer">
          <div className="footer-quote">«Cantabria infinita» — nos vemos en Santander 🌅</div>
          <div className="footer-sub">Playa del Sardinero · Bahía de Santander · gemacht mit ☀️ für Maurices ERASMUS</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  isConfigured ? <App /> : <SetupScreen />
);
</script>
</body>
</html>
