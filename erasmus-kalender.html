<style>

    --card: #fffdf8;
    --ink: #20292b;
    --ink2: #4c585b;
    --muted: #8b8579;
    --line: #e6dfd1;
    --line2: #efe9dc;

  html, body { margin: 0; padding: 0; }
  body {

  .hero-text { position: relative; text-align: center; color: #fff; padding: 0 24px 46px; }
  .hero-kicker { font-size: .72rem; font-weight: 600; letter-spacing: .34em; text-transform: uppercase;
    opacity: .9; }
  .hero-title { font-family: "Fraunces", Georgia, serif; font-weight: 500;
    font-size: clamp(2.4rem, 7vw, 3.7rem); margin: 10px 0 6px; line-height: 1.02; letter-spacing: -.015em;

  .hero-sub { font-size: clamp(.95rem, 2.4vw, 1.1rem); font-weight: 400; opacity: .96; letter-spacing: .01em; }

  .status { display: inline-flex; align-items: center; gap: 8px; font-size: .78rem; font-weight: 600; color: var(--muted); }
  .status .dot-s { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .status.online .dot-s { background: #3f9b60; box-shadow: 0 0 0 3px rgba(63,155,96,.16); }
  .status.offline .dot-s { background: var(--terra); }

  .stat { background: var(--card); padding: 18px 14px; text-align: center; }
  .stat-num { font-family: "Fraunces", serif; font-size: 1.9rem; font-weight: 500; line-height: 1; color: var(--sea-deep); }
  .stat-label { font-size: .7rem; font-weight: 600; color: var(--muted); margin-top: 7px;
    text-transform: uppercase; letter-spacing: .08em; }

  /* TOOLBAR */
  .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin: 22px 0 14px;
    justify-content: space-between; }
  .tb-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .modes { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; padding: 3px; background: var(--card); }
  .modes button { border: 0; background: transparent; color: var(--ink2); padding: 8px 18px; border-radius: 999px;

  .modes button.active { background: var(--sea); color: #fff; }
  .lockbtn { display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--line); background: var(--card);

  .lockbtn:hover { border-color: var(--sea); color: var(--sea-deep); }
  .lockbtn.unlocked { border-color: #c4ddd3; background: #eef6f1; color: #226b3e; }
  .lockbtn svg { width: 13px; height: 13px; }

  .month-nav button:hover:not(:disabled) { border-color: var(--sea); color: var(--sea); }
  .month-nav button:disabled { opacity: .3; cursor: not-allowed; }
  .month-label { font-family: "Fraunces", serif; font-weight: 500; font-size: 1.18rem; min-width: 168px;

  .dow { text-align: center; font-size: .68rem; font-weight: 600; color: var(--muted);

  .cell.empty { background: transparent; border: 0; }
  .cell.out { background: transparent; border-color: var(--line2); opacity: .4; }
  .cell.clickable { cursor: pointer; }
  .cell.clickable:hover { border-color: var(--sea); }
  .cell.weekend { background: #faf4e9; }
  .cell.has-visitor { border-color: #b6ddc3; }
  .cell.sel { box-shadow: inset 0 0 0 1.5px var(--sea); border-color: var(--sea); }
  .cell.blocked { background: repeating-linear-gradient(45deg, #f0ece1, #f0ece1 6px, #e7e0d0 6px, #e7e0d0 12px);

  .cell.blocked .daynum { color: var(--blocked); }
  .cell.ferien::after { content: ""; position: absolute; left: 6px; right: 6px; bottom: 5px; height: 2px;

  .cell-top { display: flex; align-items: center; justify-content: space-between; }
  .daynum { font-size: .82rem; font-weight: 600; color: var(--ink); line-height: 1; }
  .cell.today .daynum { color: var(--terra); position: relative; }

  .flights { display: flex; flex-direction: column; gap: 2px; margin-top: 3px; }
  .fchip { font-size: .55rem; font-weight: 600; border-radius: 4px; padding: 1px 4px; line-height: 1.5;

  .fchip.out { background: var(--fly-out); }
  .fchip.ret { background: var(--fly-ret); }

  .vtag.anon { background: var(--visit); }
  .vmore { font-size: .56rem; color: var(--muted); font-weight: 600; padding-left: 2px; }
  .etag { color: #fff; font-size: .56rem; font-weight: 600; border-radius: 4px; padding: 1px 5px;

  .legend span { display: inline-flex; align-items: center; gap: 7px; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid var(--line); position: relative; }
  .sw.visitors { background: var(--visit); border: 0; }
  .sw.termin { background: var(--ev-info); border: 0; }
  .sw.today { border: 0; background: transparent; }

  .sw.fret { background: var(--fly-ret); border: 0; }

  ul.visit-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  li.visit-item { display: flex; align-items: center; gap: 13px; padding: 13px 16px; border: 1px solid var(--line);

  .vi-dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .vi-name { font-weight: 600; }
  .vi-dates { color: var(--ink2); font-size: .86rem; }
  .vi-meta { font-size: .72rem; color: var(--sea-deep); font-weight: 600; background: #e9f1f3; padding: 3px 9px;

  .vi-people { font-size: .72rem; color: var(--muted); font-weight: 500; white-space: nowrap; }
  .vi-spacer { flex: 1; }
  .del { border: 1px solid var(--line); background: #fff; color: var(--muted); cursor: pointer; width: 30px; height: 30px;
    border-radius: 8px; font-size: 1.1rem; line-height: 1; transition: .15s; flex: none; }
  .del:hover { border-color: var(--terra); color: var(--terra); }
  .empty-state { color: var(--muted); font-size: .9rem; }

  .footer { margin-top: 52px; text-align: center; padding-top: 26px; border-top: 1px solid var(--line); }
  .footer-quote { font-family: "Fraunces", serif; font-size: 1.1rem; font-style: italic; color: var(--sea-deep); }
  .footer-sub { font-size: .76rem; color: var(--muted); margin-top: 5px; letter-spacing: .02em; }

  .setup { max-width: 680px; margin: 48px auto; background: var(--card); border: 1px solid var(--line);
    border-radius: var(--r); padding: 32px; box-shadow: var(--shadow); }
  .setup h2 { margin-top: 0; font-family: "Fraunces", serif; font-weight: 500; }
  .setup code { background: #163840; color: #e8f4f7; border-radius: 5px; padding: 1px 6px; font-size: .85rem; }
  .setup ol { padding-left: 20px; } .setup li { margin-bottom: 8px; }
  .loading { text-align: center; color: var(--muted); padding: 90px 0; font-family: "Fraunces", serif;
    font-style: italic; font-size: 1.1rem; }

  @media (max-width: 640px) {
    .wrap { padding: 0 14px 56px; }
    .hero { min-height: 260px; }
    .hero-text { padding-bottom: 32px; }
    form.visit { grid-template-columns: 1fr 1fr; }
    form.visit .full { grid-column: 1 / -1; }
    .btn.submit { grid-column: 1 / -1; }
    .event-form .ef-row { grid-template-columns: 1fr 1fr; }
    .event-form .ef-row .full { grid-column: 1 / -1; }
    .event-form .btn { width: 100%; }
    .grid { gap: 4px; }
    .cell { aspect-ratio: auto; min-height: 72px; padding: 4px 4px 5px; }
    .daynum { font-size: .76rem; }
    .hflag { font-size: .6rem; }
    .flights { gap: 3px; }
    .fchip { font-size: .56rem; padding: 1px 4px; }
    .fchip .full { display: none; }
    .fchip .arr { display: inline; font-weight: 700; }
    .vtag, .etag { font-size: .56rem; }
    .month-label { min-width: 130px; font-size: 1.05rem; }
    .stat-num { font-size: 1.5rem; }
  }
</style>

const iso = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const parseISO = (s) => { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); };
const inRange = (d) => d >= START && d <= END;
const fmtDE = (s) => { const d = parseISO(s); return `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.${d.getFullYear()}`; };
const fmtShort = (s) => { const d = parseISO(s); return `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.`; };
const nights = (from, to) => Math.round((parseISO(to) - parseISO(from)) / 86400000);

const FERIEN_DAYS = (() => {
  const set = new Set(); const names = {};
  for (const f of FERIEN) {
    let d = parseISO(f.from); const end = parseISO(f.to);
    while (d <= end) { const k = iso(d); set.add(k); names[k] = f.name; d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1); }
  }
  return { set, names };
})();

function Countdown() {
  const now = new Date(); const t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const totalDays = Math.round((END - START) / 86400000) + 1;
  let txt;
  if (t0 < START) { const d = Math.ceil((START - t0) / 86400000); txt = `Noch ${d} ${d === 1 ? "Tag" : "Tage"} bis Santander`; }
  else if (t0 <= END) { const day = Math.round((t0 - START) / 86400000) + 1; txt = `Tag ${day} von ${totalDays} in Santander`; }
  else txt = "Hasta la próxima, Santander";
  return <span className="countdown">{txt}</span>;
}

function App() {
  const [blocked, setBlocked] = useState({});
  const [visits, setVisits] = useState([]);
  const [events, setEvents] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [online, setOnline] = useState(false);
  const [mode, setMode] = useState("view");
  const [monthCursor, setMonthCursor] = useState(new Date(2026, 8, 1));
  const [form, setForm] = useState({ name: "", from: "", to: "", people: "" });
  const [evForm, setEvForm] = useState({ title: "", from: "", to: "", blocks: true });
  const [error, setError] = useState("");
  const [evError, setEvError] = useState("");
  const [added, setAdded] = useState(false);
  const [layers, setLayers] = useState({ weekend: true, holiday: true, ferien: true, events: true, flights: true });
  const [unlocked, setUnlocked] = useState(() => {
    try { return localStorage.getItem("maurice-unlocked") === "1"; } catch (e) { return false; }
  });
  const formRef = useRef(null);
  const nameRef = useRef(null);

  useEffect(() => {
    const aRef = db.ref("blocked"), vRef = db.ref("visits"), eRef = db.ref("events"), cRef = db.ref(".info/connected");
    const onA = aRef.on("value", (s) => { setBlocked(s.val() || {}); setLoaded(true); });
    const onV = vRef.on("value", (s) => {
      const val = s.val() || {};
      const arr = Object.entries(val).map(([id, v]) => ({ id, ...v }));
      arr.sort((a, b) => a.from.localeCompare(b.from) || a.name.localeCompare(b.name));
      setVisits(arr);
    });
    const onE = eRef.on("value", (s) => {
      const val = s.val() || {};
      const arr = Object.entries(val).map(([id, v]) => ({ id, ...v }));
      arr.sort((a, b) => a.from.localeCompare(b.from));
      setEvents(arr);
    });
    const onC = cRef.on("value", (s) => setOnline(!!s.val()));
    return () => { aRef.off("value", onA); vRef.off("value", onV); eRef.off("value", onE); cRef.off("value", onC); };
  }, []);

  const todayIso = iso(new Date());

  const visitorsByDay = useMemo(() => {
    const map = {};
    for (const v of visits) {
      let d = parseISO(v.from); const end = parseISO(v.to);
      while (d <= end) { const k = iso(d); (map[k] = map[k] || []).push(v.name); d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1); }
    }
    return map;
  }, [visits]);

  const eventsByDay = useMemo(() => {
    const map = {}; const blk = new Set();
    for (const ev of events) {
      let d = parseISO(ev.from); const end = parseISO(ev.to);
      while (d <= end) { const k = iso(d); (map[k] = map[k] || []).push(ev); if (ev.blocks) blk.add(k); d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1); }
    }
    return { map, blocked: blk };
  }, [events]);

  const cells = useMemo(() => {
    const y = monthCursor.getFullYear(), m = monthCursor.getMonth();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    let lead = (new Date(y, m, 1).getDay() + 6) % 7;
    const arr = [];
    for (let i = 0; i < lead; i++) arr.push(null);
    for (let d = 1; d <= daysInMonth; d++) arr.push(new Date(y, m, d));
    while (arr.length % 7 !== 0) arr.push(null);
    return arr;
  }, [monthCursor]);

  const canPrev = monthCursor > new Date(START.getFullYear(), START.getMonth(), 1);
  const canNext = monthCursor < new Date(END.getFullYear(), END.getMonth(), 1);
  const shift = (delta) => setMonthCursor(c => new Date(c.getFullYear(), c.getMonth()+delta, 1));

  const toggleBlock = (key) => {
    if (blocked[key]) db.ref("blocked/" + key).remove();
    else db.ref("blocked/" + key).set(true);
  };

  const handleDayClick = (d) => {
    if (!inRange(d)) return;
    const key = iso(d);
    if (mode === "edit") { if (unlocked) toggleBlock(key); return; }
    setForm(f => {
      if (!f.from || (f.from && f.to)) return { ...f, from: key, to: "" };
      if (key < f.from) return { ...f, from: key, to: "" };
      return { ...f, to: key };
    });
  };

  const scrollToForm = () => {
    if (formRef.current) formRef.current.scrollIntoView({ behavior: "smooth", block: "center" });
    setTimeout(() => nameRef.current && nameRef.current.focus(), 350);
  };

  const addVisit = (e) => {
    e.preventDefault(); setError("");
    const name = form.name.trim();
    if (!name) return setError("Bitte einen Namen eingeben.");
    if (!form.from || !form.to) return setError("Bitte Start- und Enddatum wählen.");
    const f = parseISO(form.from), t = parseISO(form.to);
    if (t < f) return setError("Das Enddatum liegt vor dem Startdatum.");
    if (!inRange(f) || !inRange(t)) return setError("Bitte ein Datum innerhalb des Zeitraums wählen (01.09.2026 – 15.01.2027).");
    const people = Math.max(1, parseInt(form.people, 10) || 1);
    db.ref("visits").push({ name, from: form.from, to: form.to, people });
    setForm({ name: "", from: "", to: "", people: "" });
    setAdded(true);
  };
  const removeVisit = (id) => { if (confirm("Diesen Besuch wirklich löschen?")) db.ref("visits/" + id).remove(); };

  const addEvent = (e) => {
    e.preventDefault(); setEvError("");
    const title = evForm.title.trim();
    if (!title) return setEvError("Bitte einen Titel eingeben (z. B. Klausur, Marathon).");
    if (!evForm.from || !evForm.to) return setEvError("Bitte Start- und Enddatum wählen.");
    const f = parseISO(evForm.from), t = parseISO(evForm.to);
    if (t < f) return setEvError("Das Enddatum liegt vor dem Startdatum.");
    if (!inRange(f) || !inRange(t)) return setEvError("Bitte ein Datum innerhalb des Zeitraums wählen.");
    db.ref("events").push({ title, from: evForm.from, to: evForm.to, blocks: !!evForm.blocks });
    setEvForm({ title: "", from: "", to: "", blocks: true });
  };
  const removeEvent = (id) => { if (confirm("Diesen Termin wirklich löschen?")) db.ref("events/" + id).remove(); };

  const unlock = () => {
    const pin = window.prompt("PIN eingeben (nur für Maurice):");
    if (pin === null) return;
    if (pin === MAURICE_PIN) { setUnlocked(true); try { localStorage.setItem("maurice-unlocked", "1"); } catch (e) {} }
    else window.alert("Falsche PIN.");
  };
  const lock = () => { setUnlocked(false); setMode("view"); try { localStorage.removeItem("maurice-unlocked"); } catch (e) {} };

  const feedback = useMemo(() => {
    if (!form.from || !form.to) return null;
    const f = parseISO(form.from), t = parseISO(form.to);
    if (t < f) return null;
    let total = 0, blockedDays = 0;
    for (let d = new Date(f); d <= t; d.setDate(d.getDate()+1)) {
      if (!inRange(d)) continue;
      total++; if (blocked[iso(d)] || eventsByDay.blocked.has(iso(d))) blockedDays++;
    }
    const overlaps = visits.filter(v => !(parseISO(v.to) < f || parseISO(v.from) > t));
    const blockingEvents = events.filter(ev => ev.blocks && !(parseISO(ev.to) < f || parseISO(ev.from) > t));
    return { total, blockedDays, overlaps, blockingEvents };
  }, [form.from, form.to, blocked, visits, events, eventsByDay]);

  const selSet = useMemo(() => {
    const s = new Set();
    if (!form.from) return s;
    const f = parseISO(form.from), t = form.to ? parseISO(form.to) : f;
    if (t < f) { s.add(form.from); return s; }
    for (let d = new Date(f); d <= t; d.setDate(d.getDate()+1)) s.add(iso(d));
    return s;
  }, [form.from, form.to]);

  const minIso = iso(START), maxIso = iso(END);
  const toggleLayer = (k) => setLayers(l => ({ ...l, [k]: !l[k] }));

  if (!loaded) return <div className="wrap"><div className="loading">Verbinde mit Santander…</div></div>;

  const blockedAll = new Set(Object.keys(blocked));
  eventsByDay.blocked.forEach(k => blockedAll.add(k));
  const note = MONTH_NOTES[monthCursor.getMonth()];

  return (
    <div>
      <div className="hero">
        <HeroScene />
        <div className="hero-veil"></div>
        <div className="hero-text">
          <div className="hero-kicker">ERASMUS · Cantabria</div>
          <div className="hero-title">Maurice en Santander</div>
          <div className="hero-dates">1. September 2026 – 15. Januar 2027</div>
        </div>
      </div>

      <div className="wrap">
        <div className="bar">
          <Countdown />
          <span className={"status " + (online ? "online" : "offline")}>
            <i className="dot-s"></i>{online ? "Live verbunden" : "Offline"}
          </span>
        </div>

        <div className="stats">
          <div className="stat"><div className="stat-num">{blockedAll.size}</div><div className="stat-label">gesperrte Tage</div></div>
          <div className="stat"><div className="stat-num">{visits.length}</div><div className="stat-label">geplante Besuche</div></div>
          <div className="stat"><div className="stat-num">{visits.reduce((s, v) => s + nights(v.from, v.to), 0)}</div><div className="stat-label">Übernachtungen</div></div>
        </div>

        <div className="toolbar">
          <div className="tb-left">
            <div className="modes">
              <button className={mode==="view"?"active":""} onClick={() => setMode("view")}>Ansehen</button>
              {unlocked && <button className={mode==="edit"?"active":""} onClick={() => setMode("edit")}>Tage sperren</button>}
            </div>
            {unlocked
              ? <button className="lockbtn unlocked" onClick={lock}><LockIcon /> Abmelden</button>
              : <button className="lockbtn" onClick={unlock}><LockIcon /> Maurice</button>}
          </div>
          <div className="month-nav">
            <button onClick={() => shift(-1)} disabled={!canPrev} aria-label="Zurück">‹</button>
            <div className="month-label">{MONTHS[monthCursor.getMonth()]} {monthCursor.getFullYear()}</div>
            <button onClick={() => shift(1)} disabled={!canNext} aria-label="Weiter">›</button>
          </div>
        </div>

        <div className="layers">
          <Chip on={layers.flights} onClick={() => toggleLayer("flights")}>Flüge CRL ↔ Santander</Chip>
          <Chip on={layers.weekend} onClick={() => toggleLayer("weekend")}>Wochenenden</Chip>
          <Chip on={layers.holiday} onClick={() => toggleLayer("holiday")}>Feiertage</Chip>
          <Chip on={layers.ferien} onClick={() => toggleLayer("ferien")}>Ferien Saarland</Chip>
          <Chip on={layers.events} onClick={() => toggleLayer("events")}>Termine</Chip>
        </div>

        {mode === "view" && form.from && (
          <div className="sel-banner">
            Ausgewählt: {fmtShort(form.from)}{form.to ? ` – ${fmtShort(form.to)}` : " …"}
            {!form.to && <span style={{fontWeight:400, color:"var(--muted)"}}>(Endtag wählen)</span>}
            <span className="sb-spacer"></span>
            <button className="go" onClick={scrollToForm}>Eintragen ↓</button>
            <button className="clr" onClick={() => setForm(f => ({...f, from:"", to:""}))}>✕</button>
          </div>
        )}

        <div className="card">
          {note && <div className="month-note">{note}</div>}
          {mode === "edit"
            ? <div className="hint edit">Klick die Tage an, an denen kein Besuch möglich ist. Erneuter Klick hebt die Sperre auf. Für benannte Termine nutze „Termine & Sperrtage“ weiter unten.</div>
            : <div className="hint">Tipp: Tage antippen, um einen Besuchszeitraum zu wählen – das Formular unten füllt sich automatisch.</div>}
          <div className="grid">
            {DOW.map((d) => <div key={d} className="dow">{d}</div>)}
            {cells.map((d, i) => {
              if (!d) return <div key={i} className="cell empty" />;
              const key = iso(d);
              const within = inRange(d);
              const vs = visitorsByDay[key] || [];
              const wd = d.getDay();
              const isWeekend = wd === 0 || wd === 6;
              const hol = HOLIDAYS[key];
              const isFerien = FERIEN_DAYS.set.has(key);
              const evs = layers.events ? (eventsByDay.map[key] || []) : [];
              const isBlocked = !!blocked[key] || (layers.events && eventsByDay.blocked.has(key));
              const fOut = layers.flights ? FLIGHTS_OUT[key] : null;
              const fRet = layers.flights ? FLIGHTS_RET[key] : null;
              const cls = ["cell"];
              if (!within) cls.push("out");
              if (within) cls.push("clickable");
              if (within && layers.weekend && isWeekend) cls.push("weekend");
              if (within && layers.ferien && isFerien) cls.push("ferien");
              if (vs.length) cls.push("has-visitor");
              if (isBlocked) cls.push("blocked");
              if (within && selSet.has(key)) cls.push("sel");
              if (key === todayIso) cls.push("today");
              const titleBits = [];
              if (hol) titleBits.push(hol.map(h => h.n).join(" · "));
              if (isFerien) titleBits.push(FERIEN_DAYS.names[key]);
              if (within && fOut) titleBits.push("Hinflug Charleroi → Santander, ab " + fOut);
              if (within && fRet) titleBits.push("Rückflug Santander → Charleroi, ab " + fRet);
              const evShow = (!!blocked[key] && !evs.some(e => e.blocks)) ? [{ title: "Gesperrt", blocks: true }, ...evs] : evs;
              if (evShow.length) titleBits.push(evShow.map(e => (e.blocks ? "Gesperrt: " : "") + e.title).join(" · "));
              if (vs.length) titleBits.push(unlocked ? ("Besuch: " + vs.join(", ")) : (vs.length > 1 ? vs.length + " Besuche" : "Besuch eingetragen"));
              const visMax = evShow.length ? 1 : 2;
              const extra = unlocked
                ? (Math.max(0, evShow.length - 1) + Math.max(0, vs.length - visMax))
                : Math.max(0, evShow.length - 1);
              return (
                <div key={i} className={cls.join(" ")} onClick={() => handleDayClick(d)} title={titleBits.join(" — ") || undefined}>
                  <div className="cell-top">
                    <span className="daynum">{d.getDate()}</span>
                    {within && layers.holiday && hol &&
                      <span className="hflag">{[...new Set(hol.map(h => FLAG[h.c]))].join("")}</span>}
                  </div>
                  {within && (fOut || fRet) && (
                    <div className="flights">
                      {fOut && <span className="fchip out" title={`Hinflug Charleroi → Santander, ab ${fOut}`}><span className="full">Hin</span><span className="arr">→</span> {fOut}</span>}
                      {fRet && <span className="fchip ret" title={`Rückflug Santander → Charleroi, ab ${fRet}`}><span className="full">Rück</span><span className="arr">←</span> {fRet}</span>}
                    </div>
                  )}
                  {(evShow.length > 0 || vs.length > 0) && (
                    <div className="vtags">
                      {evShow.slice(0,1).map((ev, j) => (
                        <span key={"e"+j} className={"etag " + (ev.blocks ? "block" : "info")} title={ev.title}>{ev.title}</span>
                      ))}
                      {unlocked
                        ? vs.slice(0, visMax).map((n, j) => (
                            <span key={"v"+j} className="vtag" style={{background: colorFor(n)}} title={n}>{n.split(" ")[0]}</span>))
                        : vs.length > 0 && <span className="vtag anon">{vs.length > 1 ? `Besuch ×${vs.length}` : "Besuch"}</span>}
                      {extra > 0 && <span className="vmore">+{extra}</span>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div className="legend">
            {layers.flights && <span><i className="sw fout"></i> Hinflug → Santander</span>}
            {layers.flights && <span><i className="sw fret"></i> Rückflug → Charleroi</span>}
            <span><i className="sw visitors"></i> Besuch</span>
            {layers.events && <span><i className="sw termin"></i> Termin</span>}
            <span><i className="sw blocked"></i> gesperrt</span>
            <span><i className="sw today"></i> heute</span>
            {layers.weekend && <span><i className="sw weekend"></i> Wochenende</span>}
            {layers.ferien && <span><i className="sw ferien"></i> Ferien</span>}
            {layers.holiday && <span>{FLAG.de}{FLAG.es} Feiertag</span>}
          </div>
        </div>

        <section className="block" ref={formRef}>
          <h2>Besuch eintragen</h2>
          <div className="sec-note">Trag dich ein, wann du kommen möchtest. Wer wann kommt, sieht nur Maurice.</div>
          <div className="card">
            <form className="visit" onSubmit={addVisit}>
              <div className="field full">
                <label>Name</label>
                <input ref={nameRef} type="text" placeholder="Dein Name" value={form.name}
                  onChange={e => { setForm({...form, name: e.target.value}); setAdded(false); }} />
              </div>
              <div className="field">
                <label>Von</label>
                <input type="date" min={minIso} max={maxIso} value={form.from} onChange={e => setForm({...form, from: e.target.value})} />
              </div>
              <div className="field">
                <label>Bis</label>
                <input type="date" min={minIso} max={maxIso} value={form.to} onChange={e => setForm({...form, to: e.target.value})} />
              </div>
              <div className="field">
                <label>Pers.</label>
                <input type="number" min="1" placeholder="1" value={form.people} onChange={e => setForm({...form, people: e.target.value})} />
              </div>
              <button type="submit" className="btn submit">Eintragen</button>
            </form>
            {feedback && (
              <div className="fb">
                {feedback.blockingEvents.length > 0
                  ? <div className="fb-line fb-bad">Besuch nicht möglich: {feedback.blockingEvents.map(b => `${b.title} (${fmtShort(b.from)}–${fmtShort(b.to)})`).join(", ")}</div>
                  : feedback.blockedDays > 0
                    ? <div className="fb-line fb-bad">{feedback.blockedDays} von {feedback.total} Tagen sind gesperrt</div>
                    : <div className="fb-line fb-ok">An diesen Tagen ist ein Besuch möglich</div>}
                {feedback.overlaps.length > 0 && (unlocked
                  ? <div className="fb-line fb-warn">Gleichzeitig da: {feedback.overlaps.map(o => `${o.name} (${fmtShort(o.from)}–${fmtShort(o.to)})`).join(", ")}</div>
                  : <div className="fb-line fb-warn">An diesen Tagen kommt bereits jemand.</div>)}
              </div>
            )}
            {error && <div className="form-error">{error}</div>}
            {added && <div className="fb"><div className="fb-line fb-ok">Dein Besuch wurde eingetragen – danke!</div></div>}
          </div>
        </section>

        <section className="block">
          <h2>Termine & Sperrtage</h2>
          {unlocked ? (
            <>
              <div className="sec-note">Nur für Maurice: eigene Termine (Klausur, Marathon …). Mit Häkchen sperrst du Tage für Besuche.</div>
              <div className="card">
                <form className="event-form" onSubmit={addEvent}>
                  <div className="ef-row">
                    <div className="field full">
                      <label>Titel</label>
                      <input type="text" placeholder="z. B. Klausur, Marathon" value={evForm.title} onChange={e => setEvForm({...evForm, title: e.target.value})} />
                    </div>
                    <div className="field"><label>Von</label><input type="date" min={minIso} max={maxIso} value={evForm.from} onChange={e => setEvForm({...evForm, from: e.target.value})} /></div>
                    <div className="field"><label>Bis</label><input type="date" min={minIso} max={maxIso} value={evForm.to} onChange={e => setEvForm({...evForm, to: e.target.value})} /></div>
                  </div>
                  <div className="ef-row2">
                    <label className="chk">
                      <input type="checkbox" checked={evForm.blocks} onChange={e => setEvForm({...evForm, blocks: e.target.checked})} />
                      An diesen Tagen ist kein Besuch möglich
                    </label>
                    <button type="submit" className="btn">Termin speichern</button>
                  </div>
                </form>
                {evError && <div className="form-error">{evError}</div>}
              </div>
            </>
          ) : (
            <div className="sec-note">Diese Termine pflegt Maurice{events.length === 0 ? " – aktuell keine Sperrtage." : "."}</div>
          )}
          {events.length > 0 && (
            <ul className="visit-list" style={{marginTop: "14px"}}>
              {events.map(ev => (
                <li key={ev.id} className="visit-item" style={{borderLeftColor: ev.blocks ? "var(--ev-block)" : "var(--ev-info)"}}>
                  <span className="vi-name" style={{color: ev.blocks ? "var(--ev-block)" : "var(--ev-info)"}}>{ev.title}</span>
                  <span className="vi-dates">{fmtDE(ev.from)} – {fmtDE(ev.to)}</span>
                  {ev.blocks && <span className="vi-meta" style={{background:"#f6e0db", color:"var(--ev-block)"}}>gesperrt</span>}
                  <span className="vi-spacer"></span>
                  {unlocked && <button className="del" title="Löschen" onClick={() => removeEvent(ev.id)}>×</button>}
                </li>
              ))}
            </ul>
          )}
        </section>

        <section className="block">
          <h2>Geplante Besuche {visits.length > 0 && `(${visits.length})`}</h2>
          {visits.length === 0 ? (
            <div className="card"><div className="empty-state">Noch keine Besuche eingetragen.</div></div>
          ) : (
            <ul className="visit-list">
              {visits.map(v => {
                const n = nights(v.from, v.to);
                const col = colorFor(v.name);
                const ppl = v.people || 1;
                return (
                  <li key={v.id} className="visit-item" style={{borderLeftColor: unlocked ? col : "var(--line)"}}>
                    <span className="vi-dot" style={{background: unlocked ? col : "var(--muted)"}}></span>
                    <span className="vi-name">{unlocked ? v.name : "Besuch"}</span>
                    <span className="vi-dates">{fmtDE(v.from)} – {fmtDE(v.to)}</span>
                    <span className="vi-meta">{n === 0 ? "Tagesbesuch" : `${n} ${n === 1 ? "Nacht" : "Nächte"}`}</span>
                    {unlocked && ppl > 1 && <span className="vi-people">{ppl} Personen</span>}
                    <span className="vi-spacer"></span>
                    {unlocked && <button className="del" title="Löschen" onClick={() => removeVisit(v.id)}>×</button>}
                  </li>
                );
              })}
            </ul>
          )}
        </section>

        <div className="footer">
          <div className="footer-quote">Cantabria infinita — nos vemos en Santander</div>
          <div className="footer-sub">Playa del Sardinero · Bahía de Santander</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(isConfigured ? <App /> : <SetupScreen />);
</script>
</body>
</html>
